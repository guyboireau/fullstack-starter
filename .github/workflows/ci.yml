name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (web)
        run: npm run lint -w apps/web

      - name: Lint (api)
        run: npm run lint -w apps/api

      - name: Type check (web)
        run: npm run typecheck -w apps/web

      - name: Type check (api)
        run: npm run typecheck -w apps/api

      - name: Build (web)
        run: npm run build -w apps/web
        env:
          VITE_SUPABASE_URL: https://mock-url.supabase.co
          VITE_SUPABASE_ANON_KEY: mock-anon-key

      - name: Build (api)
        run: npm run build -w apps/api
        env:
          SUPABASE_URL: https://mock-url.supabase.co
          SUPABASE_ANON_KEY: mock-anon-key
          DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
